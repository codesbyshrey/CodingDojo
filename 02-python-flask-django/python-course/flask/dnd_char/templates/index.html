<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- BOOTSTRAP -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
     <title> My DnD Character</title>
</head>
<body>
     <div class="container">
          <h1> My D&D World </h1>
          <div class="row">
               <div class="col-6">
                    <!-- Bootstrap is based on a 12 column system -->
                    <!-- Your Form Submission Information will be redirected to an Action Route and Be available in the form of a Secret Cookie-->
                    <h2> Build Your Character </h2>
                    <form action="/process_character" methods="post">
                         <div>
                              <label for="name"> Name </label>
                              <!-- class = form-control needed for bootstrap -->
                              <input class="form-control" type="text" name="name" id="name" placeholder="Name">
                         </div>
                         <div>
                              <label for="race"> Race </label>
                              <!-- class = form-select needed for bootstrap-->
                              <select class="form-select" name="race" id="race">
                                   <option value="human"> Human </option>
                                   <option value="elf"> Elves </option>
                                   <option value="dwarf"> Dwarves </option>
                                   <option value="tiefling"> Tieflings </option>
                                   <option value="gnome"> Gnomes </option>
                                   <option value="orc"> Orcs </option>
                              </select>
                         </div>
                         <div>
                              <label for="strength"> Strength </label>
                              <select class="form-select" name="strength" id="strength">
                                   {% for idx in range(1, 21) %}
                                        <option value="{{ idx }}"> {{ idx }} </option>
                                   {% endfor %}
                              </select>
                         </div>
                         <div>
                              <label for="defense"> Defense </label>
                              <select class="form-select" name="defense" id="defense">
                                   {% for idx in range(1, 21) %}
                                        <option value="{{idx}}"> {{idx}} </option>
                                   {% endfor %}
                              </select>
                         </div>
                         <div>
                              <label for="speed"> Strength </label>
                              <select class="form-select" name="speed" id="speed">
                                   {% for idx in range(1, 21) %}
                                        <option value="{{idx}}"> {{idx}} </option>
                                   {% endfor %}
                              </select>
                         </div>
                         <!-- class = btn btn-success needed for bootstrap-->
                         <button class="btn btn-success"> Create Character </button>
                    </form>
               </div>
               <div class="col-6">
                    <h2> All Characters </h2>
                    <table class="table">
                         <thead>
                              <tr>
                                   <th> Name </th>
                                   <th> Race </th>
                                   <th> Strength </th>
                                   <th> Defense </th>
                                   <th> Speed </th>
                                   <th> Action </th>
                              </tr>
                         </thead>
                         <tbody>
                              {% for character in session.characters %}
                              <tr>
                                   <td> {{ character.name }} </td>
                                   <td> {{ character.race }} </td>
                                   <td> {{ character.strength }} </td>
                                   <td> {{ character.defense }} </td>
                                   <td> {{ character.speed }} </td>
                                   <td>
                                        <a class="text-danger" href="/delete/{{ character.id }}"> Delete </a>
                                   </td>
                              </tr>
                              {% endfor %}
                         </tbody>
                    </table>
               </div>
          </div>
     </div>

     <!-- BOOTSTRAP -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
</body>
</html>

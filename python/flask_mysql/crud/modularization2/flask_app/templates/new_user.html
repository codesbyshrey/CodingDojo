<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
     <title> Add Your User</title>
</head>
<body>
     <h1> Add New Users: </h1>
     <form action="/user/create" method="post">
     <div>
          <label for="first_name">First Name</label>
          <input type="text" name="first_name" placeholder="First Name Here" >
     </div>
     <div>
          <label for="last_name">Last Name</label>
          <input type="text" name="last_name" placeholder="Last Name Here" >
     </div>
     <div>
          <label for="email">Email</label>
          <input type="text" name="email" placeholder="Email@email here" >
     </div>
     <input type="submit" value="add_user">
     </form>
     <div>
          <a href="/user"> Home Page </a>
     </div>
</body>
</html>
